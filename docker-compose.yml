version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/apartment-complaints
      - REDIS_HOST=redis
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
    volumes:
      - ./public/uploads:/app/public/uploads
      - ./public/reports:/app/public/reports
    restart: unless-stopped

  mongo:
    image: mongo:5.0
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=apartment-complaints
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:

networks:
  default:
    name: apartment-system-network
